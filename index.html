<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#120f1d" />
  <title>pathpilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            sm: 'var(--shadow-sm)',
            md: 'var(--shadow-md)',
            lg: 'var(--shadow-lg)'
          },
          borderRadius: {
            sm: 'var(--radius-sm)',
            md: 'var(--radius-md)',
            lg: 'var(--radius-lg)'
          },
          transitionDuration: {
            250: '250ms',
            400: '400ms'
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body class="bg-[hsl(var(--background))] text-[hsl(var(--foreground))] antialiased">
  <div id="root"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
